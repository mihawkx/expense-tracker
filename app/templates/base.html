<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Gastos{% endblock %} — Fintrack</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Plus Jakarta Sans', 'sans-serif'],
            body: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            ink: { 950: '#0a0e1a', 900: '#0f1523', 800: '#161d30', 700: '#1e2740' },
            lime: { 400: '#c8f135', 500: '#b5e020' },
          }
        }
      }
    }
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    h1, h2, h3, .font-display { font-family: 'Plus Jakarta Sans', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0f1523; }
    ::-webkit-scrollbar-thumb { background: #1e2740; border-radius: 4px; }
    .nav-link { transition: all 0.2s; }
    .nav-link:hover, .nav-link.active { background: rgba(200,241,53,0.08); color: #c8f135; }
    .nav-link.active .nav-icon { color: #c8f135; }
    .card { background: #161d30; border: 1px solid rgba(255,255,255,0.06); }
    .btn-primary { background: #c8f135; color: #0a0e1a; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; transition: all 0.2s; }
    .btn-primary:hover { background: #b5e020; transform: translateY(-1px); }
    .input-field { background: #1e2740; border: 1px solid rgba(255,255,255,0.08); color: #e2e8f0; transition: border-color 0.2s; }
    .input-field:focus { outline: none; border-color: #c8f135; box-shadow: 0 0 0 3px rgba(200,241,53,0.12); }
    .input-field::placeholder { color: #8892aa; }
    select.input-field option { background: #1e2740; }
    [x-cloak] { display: none !important; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
  </style>
</head>
<body class="bg-ink-950 text-slate-200 min-h-screen">
  {% block body %}{% endblock %}
</body>
</html>
