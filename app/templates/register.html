{% extends "base.html" %}
{% block title %}Criar conta{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-8">

  <!-- Blobs de fundo -->
  <div class="fixed top-0 left-0 w-96 h-96 rounded-full bg-lime-400/5 blur-3xl pointer-events-none"></div>
  <div class="fixed bottom-0 right-0 w-96 h-96 rounded-full bg-lime-400/3 blur-3xl pointer-events-none"></div>

  <div class="w-full max-w-md relative z-10">

    <div class="text-center mb-8">
      <span class="font-display text-3xl font-extrabold">Fin<span class="text-lime-400">track</span></span>
      <h1 class="font-display text-xl font-bold text-white mt-4 mb-1">Crie sua conta</h1>
      <p class="text-slate-500 text-sm">Grátis, sem cartão de crédito</p>
    </div>

    <div class="card rounded-2xl p-8">
      <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-4">

        <div>
          <label class="block text-xs font-medium text-slate-400 mb-2">Seu nome</label>
          <input type="text" name="name" required autocomplete="name"
                 placeholder="João Silva"
                 class="input-field w-full px-4 py-3 rounded-xl text-sm"/>
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-400 mb-2">E-mail</label>
          <input type="email" name="email" required autocomplete="email"
                 placeholder="seu@email.com"
                 class="input-field w-full px-4 py-3 rounded-xl text-sm"/>
        </div>

        <div x-data="{ show: false, pwd: '', strength: 0 }"
             x-init="$watch('pwd', v => {
               let s = 0;
               if(v.length >= 8) s++;
               if(/[A-Z]/.test(v)) s++;
               if(/[0-9]/.test(v)) s++;
               if(/[^A-Za-z0-9]/.test(v)) s++;
               strength = s;
             })">
          <label class="block text-xs font-medium text-slate-400 mb-2">Senha</label>
          <div class="relative">
            <input :type="show ? 'text' : 'password'" name="password" required
                   placeholder="Mínimo 8 caracteres"
                   x-model="pwd"
                   class="input-field w-full px-4 py-3 pr-11 rounded-xl text-sm"/>
            <button type="button" @click="show = !show"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 text-xs">
              <span x-text="show ? '🙈' : '👁️'"></span>
            </button>
          </div>
          <!-- Indicador de força -->
          <div class="flex gap-1 mt-2" x-show="pwd.length > 0" x-cloak>
            <template x-for="i in 4">
              <div class="flex-1 h-1 rounded-full transition-colors duration-300"
                   :class="i <= strength
                     ? (strength <= 1 ? 'bg-red-500' : strength <= 2 ? 'bg-yellow-500' : strength <= 3 ? 'bg-lime-500' : 'bg-lime-400')
                     : 'bg-white/10'"></div>
            </template>
          </div>
          <p class="text-xs mt-1.5 text-slate-500" x-show="pwd.length > 0" x-cloak
             x-text="['', 'Fraca', 'Regular', 'Boa', 'Forte'][strength]"></p>
        </div>

        <button type="submit" class="btn-primary w-full py-3 rounded-xl text-sm mt-2">
          Criar conta grátis
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-slate-500 mt-5">
      Já tem conta?
      <a href="{{ url_for('auth.login') }}" class="text-lime-400 hover:underline font-medium ml-1">Entrar</a>
    </p>
  </div>
</div>
{% endblock %}
