{% extends "base.html" %}
{% block body %}

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="fixed top-4 right-4 z-50 space-y-2 w-80">
      {% for category, message in messages %}
        <div x-data="{ show: true }" x-show="show" x-cloak
             class="flex items-center justify-between px-4 py-3 rounded-lg text-sm font-medium shadow-xl
               {% if category == 'success' %}bg-lime-400/10 text-lime-400 border border-lime-400/20
               {% elif category == 'danger' %}bg-red-500/10 text-red-400 border border-red-500/20
               {% else %}bg-blue-500/10 text-blue-400 border border-blue-500/20{% endif %}">
          <span>{{ message }}</span>
          <button @click="show = false" class="ml-3 opacity-60 hover:opacity-100">✕</button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<main class="fade-up">
  {% block content %}{% endblock %}
</main>

{% endblock %}
